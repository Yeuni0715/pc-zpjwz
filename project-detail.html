        .nav-container {

        .back-btn-nav {

        .nav-right {

        .logo-text-detail {

            font-weight: 700;
            color: var(--color-text-dark);

            letter-spacing: -0.5px;
        }

        .menu-toggle {
            display: none !important;
        }

        .detail-header {
            margin-bottom: 60px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 18px;
            background: white;
            border: 1px solid var(--color-grey-200);
            border-radius: var(--radius-md);
            color: var(--color-grey-700);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
        }

        .back-btn:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
            box-shadow: 0 4px 12px rgba(126, 96, 200, 0.3);
        }

        .project-title-wrap {
            text-align: center;
        }

        .detail-project-title {
            font-size: 36px;
            font-weight: 600;
            color: var(--color-grey-900);
            margin-bottom: 16px;
        }

        .detail-meta-tags {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .detail-meta-tag {
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.06);
            color: var(--color-primary);
            font-size: var(--font-size-xs);
            font-weight: 500;
            border-radius: var(--radius-full);
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .detail-meta-tag:hover {
            background: rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }

        /* 封面区域 */
        .detail-cover-section {
            margin-bottom: 80px;
        }

        .detail-cover {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            aspect-ratio: 16/9;
            box-shadow: var(--shadow-lg);
        }

        .detail-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, transparent 50%);
            display: flex;
            align-items: flex-end;
            padding: 30px;
        }

        .cover-title {
            font-size: 28px;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* 视频区域 */
        .detail-video-section {
            margin-bottom: 80px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-grey-900);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .video-subtitle {
            font-size: 14px;
            color: var(--color-grey-500);
            margin-bottom: 20px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--color-primary);
            border-radius: 2px;
        }

        .video-container {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--color-grey-900);
            box-shadow: var(--shadow-lg);
            max-width: 100%;
        }

        .video-container video {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: linear-gradient(135deg, var(--color-grey-800) 0%, var(--color-grey-900) 100%);
        }

        .video-placeholder i {
            font-size: 48px;
            color: rgba(255,255,255,0.3);
        }

        .video-placeholder p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        /* 概念说明区域 */
        .detail-concept-section {
            background: white;
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-md);
        }

        .concept-content {
            line-height: 1.8;
            color: var(--color-grey-700);
            font-size: 16px;
        }

        .concept-content h4 {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-grey-900);
            margin: 24px 0 12px;
        }

        .concept-content p {
            margin-bottom: 16px;
        }

        /* 图集区域 */
        .detail-gallery-section {
            margin-bottom: 60px;
        }

        .gallery-container {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-lg);
            background: var(--color-grey-100);
            touch-action: pan-x;
        }

        .gallery-track {
            display: flex;
            transition: transform 0.3s ease;
        }

        .gallery-slide {
            flex-shrink: 0;
            width: 100%;
            position: relative;
        }

        .gallery-slide img {
            width: 100%;
            height: auto;
            display: block;
        }

        .gallery-indicators {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-grey-300);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gallery-dot.active {
            background: var(--color-primary);
            width: 16px;
            border-radius: 3px;
        }

        .gallery-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 16px;
        }

        .gallery-arrow {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            border: 1px solid var(--color-grey-200);
        }

        .gallery-arrow:hover {
            background: white;
            transform: scale(1.1);
        }

        .gallery-arrow i {
            color: var(--color-grey-700);
            font-size: 16px;
        }

        /* 图片查看器 */
        .image-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .image-viewer.active {
            display: flex;
        }

        .image-viewer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-viewer.active .image-viewer-overlay {
            opacity: 1;
        }

        .image-viewer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .image-viewer-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .image-viewer-prev,
        .image-viewer-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .image-viewer-prev {
            left: 20px;
        }

        .image-viewer-next {
            right: 20px;
        }

        .image-viewer-prev:hover,
        .image-viewer-next:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.1);
        }

        .image-viewer-content {
            position: relative;
            z-index: 5;
            max-width: 90%;
            max-height: 90%;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .image-viewer.active .image-viewer-content {
            opacity: 1;
            transform: scale(1);
        }

        .image-viewer-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* 不同项目类型的footer主题色 - 更浅的色调 */
        .footer-interaction {
            background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 50%, #2d2d2d 100%);
        }

        .footer-ip {
            background: linear-gradient(135deg, #a8e6cf 0%, #88d8b0 50%, #b5f5d4 100%);
        }

        .footer-ui {
            background: linear-gradient(135deg, #e8d5ff 0%, #d4b8ff 50%, #f0e1ff 100%);
        }

        .footer-installation {
            background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 50%, #2d2d2d 100%);
        }

        /* 好梦主题 - 淡灰紫色调背景与装饰 */
        .theme-gooddream {
            background: linear-gradient(180deg, #e8e4ed 0%, #f3f0f7 50%, #faf8fc 100%);
            min-height: 100vh;
        }

        .theme-gooddream .detail-cover-section,
        .theme-gooddream .detail-video-section,
        .theme-gooddream .detail-concept-section {
            position: relative;
        }

        /* 月亮星星装饰 */
        .dream-decoration {
            position: fixed;
            font-size: 20px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 5;
        }

        .dream-moon {
            top: 15%;
            right: 8%;
            animation: float 6s ease-in-out infinite;
        }

        .dream-star1 {
            top: 25%;
            left: 10%;
            animation: float 5s ease-in-out infinite 0.5s;
        }

        .dream-star2 {
            top: 40%;
            right: 15%;
            animation: float 7s ease-in-out infinite 1s;
        }

        .dream-star3 {
            top: 60%;
            left: 15%;
            animation: float 5.5s ease-in-out infinite 1.5s;
        }

        .dream-star4 {
            top: 75%;
            right: 10%;
            animation: float 6.5s ease-in-out infinite 0.8s;
        }

        /* 狸塔塔主题 - 淡青色渐变背景 */
        .theme-litata {
            background: linear-gradient(180deg, #e8f8f5 0%, #f0fcf9 40%, #ffffff 100%);
            min-height: 100vh;
        }

        /* 云朵装饰 */
        .cloud-decoration {
            position: fixed;
            font-size: 28px;
            opacity: 0.25;
            pointer-events: none;
            z-index: 5;
        }

        .cloud1 {
            top: 12%;
            right: 5%;
            animation: floatCloud 8s ease-in-out infinite;
        }

        .cloud2 {
            top: 35%;
            left: 3%;
            animation: floatCloud 10s ease-in-out infinite 1.5s;
        }

        .cloud3 {
            top: 55%;
            right: 12%;
            animation: floatCloud 9s ease-in-out infinite 2s;
        }

        .cloud4 {
            top: 70%;
            left: 8%;
            animation: floatCloud 7.5s ease-in-out infinite 0.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        @keyframes floatCloud {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-8px) translateX(5px); }
        }

        /* 深色footer文字颜色 */
        .footer-interaction .footer-logo,
        .footer-installation .footer-logo,
        .footer-interaction .footer-contact-title,
        .footer-installation .footer-contact-title,
        .footer-interaction .footer-social-title,
        .footer-installation .footer-social-title {
            color: #ffffff;
        }

        .footer-interaction .footer-description,
        .footer-installation .footer-description {
            color: rgba(255, 255, 255, 0.7);
        }

        .footer-interaction .contact-item,
        .footer-installation .contact-item {
            color: rgba(255, 255, 255, 0.8);
        }

        .footer-interaction .footer-social-links a,
        .footer-installation .footer-social-links a {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .footer-interaction .footer-bottom,
        .footer-installation .footer-bottom {
            color: rgba(255, 255, 255, 0.6);
            border-top-color: rgba(255, 255, 255, 0.1);
        }

        /* 浅色footer文字颜色 - 好梦和狸塔塔 */
        .footer-ui .footer-logo,
        .footer-ui .footer-contact-title,
        .footer-ui .footer-social-title,
        .footer-ip .footer-logo,
        .footer-ip .footer-contact-title,
        .footer-ip .footer-social-title {
            color: #5a4a7a;
        }

        .footer-ui .footer-description,
        .footer-ip .footer-description {
            color: #7a6a8a;
        }

        .footer-ui .contact-item,
        .footer-ip .contact-item {
            color: #6a5a7a;
        }

        .footer-ui .footer-social-links a,
        .footer-ip .footer-social-links a {
            color: #5a4a7a;
            border-color: rgba(90, 74, 122, 0.3);
        }

        .footer-ui .footer-bottom,
        .footer-ip .footer-bottom {
            color: #8a7a9a;
            border-top-color: rgba(90, 74, 122, 0.1);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .detail-project-title {
                font-size: 28px;
            }

            .detail-cover-section,
            .detail-video-section {
                margin-bottom: 40px;
            }

            .detail-concept-section {
                padding: 24px;
            }

            .cover-overlay {
                padding: 20px;
            }

            .cover-title {
                font-size: 20px;
            }
        }
    </style>

    <script>
        // 项目数据
        const projects = {
            '1': {
                id: 1,
                name: '序数花园',
                title: '序数花园&沉浸式空间',
                cover: 'png/03jh/4.png',
                video: 'BV1xLVm6yE7y',
                video2: 'BV1t3Vm67EY8',
                type: 'interaction',
                tags: ['交互设计', '数字艺术', '植物美学'],
                awards: [],
                gallery: [
                    'png/03jh/4.png',
                    'png/03jh/5.png',
                    'png/03jh/6.png',
                    'png/03jh/7.png',
                    'png/03jh/8.png'
                ],
                concept: `
                    <p>《序数花园》是一件将植物与斐波那契理论相结合的交互艺术作品。通过数字媒介探索自然界的数学规律，创造出独特的视觉体验。</p>
                    <h4>设计理念</h4>
                    <p>本作品的核心概念是将数学的理性之美与植物生长的自然美学相融合。斐波那契数列在自然界中无处不在——从向日葵的种子排列到松果的鳞片分布，都遵循着这一数学规律。</p>
                    <h4>技术实现</h4>
                    <p>通过编程实现斐波那契螺旋的可视化，并结合植物生长算法，创造出动态生成的数字花园。用户可以通过交互操作影响植物的生长方向和形态，体验数学与艺术的奇妙交汇。</p>
                    <h4>音画互动</h4>

        // 图集初始化函数
        function initGallery(project) {
            const gallerySection = document.getElementById('gallery-section');
            const galleryTrack = document.getElementById('gallery-track');
            const galleryIndicators = document.getElementById('gallery-indicators');
            const prevBtn = document.getElementById('gallery-prev');
            const nextBtn = document.getElementById('gallery-next');

            // 如果没有图集数据，隐藏图集区域
            if (!project.gallery || project.gallery.length === 0) {
                gallerySection.style.display = 'none';
                return;
            }

            // 清空现有内容
            galleryTrack.innerHTML = '';
            galleryIndicators.innerHTML = '';

            // 创建图集图片
            project.gallery.forEach((imageSrc, index) => {
                // 创建图片slide
                const slide = document.createElement('div');
                slide.className = 'gallery-slide';
                
                const img = document.createElement('img');
                img.src = imageSrc;
                img.alt = `${project.name} - 图${index + 1}`;
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', () => openImageViewer(imageSrc, index));
                slide.appendChild(img);
                
                galleryTrack.appendChild(slide);

                // 创建指示器
                const dot = document.createElement('button');
                dot.className = `gallery-dot${index === 0 ? ' active' : ''}`;
                dot.setAttribute('data-index', index);
                dot.addEventListener('click', () => goToSlide(index));
                galleryIndicators.appendChild(dot);
            });

            // 滑动功能
            let currentIndex = 0;
            const slideWidth = galleryTrack.offsetWidth;

            function goToSlide(index) {
                if (index < 0 || index >= project.gallery.length) return;
                
                currentIndex = index;
                const offset = -currentIndex * slideWidth;
                galleryTrack.style.transform = `translateX(${offset}px)`;

                // 更新指示器
                document.querySelectorAll('.gallery-dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === currentIndex);
                });
            }

            // 上一张
            prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));

            // 下一张
            nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

            // 触摸滑动支持
            let touchStartX = 0;
            let touchEndX = 0;

            galleryTrack.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            }, { passive: true });

            galleryTrack.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].clientX;
                const diff = touchStartX - touchEndX;

                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        goToSlide(currentIndex + 1);
                    } else {
                        goToSlide(currentIndex - 1);
                    }
                }
            }, { passive: true });

            // 窗口大小变化时更新
            window.addEventListener('resize', () => {
                goToSlide(currentIndex);
            });
        }

        // 获取URL参数
        function getParameterByName(name) {
            const url = window.location.href;
            name = name.replace(/[\[\]]/g, '\\$&');
            const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
            const results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }

            // 根据项目类型添加主题类和装饰元素

                const dreamDecorations = [
                    { class: 'dream-decoration dream-moon', content: '🌙' },
                    { class: 'dream-decoration dream-star1', content: '⭐' },
                    { class: 'dream-decoration dream-star2', content: '✨' },

                dreamDecorations.forEach(deco => {
                    const element = document.createElement('div');
                    element.className = deco.class;
                    element.textContent = deco.content;
                    body.appendChild(element);
                });
            }
            
            // 狸塔塔主题 - 淡青色渐变 + 云朵装饰
            if (project.name === '狸塔塔') {
                body.classList.add('theme-litata');
                
                // 添加云朵装饰
                const cloudDecorations = [
                    { class: 'cloud-decoration cloud1', content: '☁️' },
                    { class: 'cloud-decoration cloud2', content: '☁️' },
                    { class: 'cloud-decoration cloud3', content: '☁️' },
                    { class: 'cloud-decoration cloud4', content: '☁️' }
                ];
                
                cloudDecorations.forEach(deco => {
                    const element = document.createElement('div');
                    element.className = deco.class;
                    element.textContent = deco.content;
                    body.appendChild(element);
                });
            }
        });

        // 图片查看器功能
        const imageViewer = document.getElementById('image-viewer');
        const imageViewerOverlay = document.getElementById('image-viewer-overlay');
        const imageViewerClose = document.getElementById('image-viewer-close');
        const imageViewerPrev = document.getElementById('image-viewer-prev');
        const imageViewerNext = document.getElementById('image-viewer-next');
        const imageViewerImage = document.getElementById('image-viewer-image');
        let currentGallery = [];
        let currentImageIndex = 0;

        function openImageViewer(imageSrc, index) {
            currentGallery = document.querySelectorAll('.gallery-slide img');
            currentImageIndex = index;
            imageViewerImage.src = imageSrc;
            imageViewer.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeImageViewer() {
            imageViewer.classList.remove('active');
            document.body.style.overflow = '';
        }

        function showPrevImage() {
            if (currentGallery.length === 0) return;
            currentImageIndex = (currentImageIndex - 1 + currentGallery.length) % currentGallery.length;
            imageViewerImage.src = currentGallery[currentImageIndex].src;
        }

        function showNextImage() {
            if (currentGallery.length === 0) return;
            currentImageIndex = (currentImageIndex + 1) % currentGallery.length;
            imageViewerImage.src = currentGallery[currentImageIndex].src;
        }

        imageViewerClose.addEventListener('click', closeImageViewer);
        imageViewerOverlay.addEventListener('click', closeImageViewer);
        imageViewerPrev.addEventListener('click', showPrevImage);
        imageViewerNext.addEventListener('click', showNextImage);

        document.addEventListener('keydown', (e) => {
            if (!imageViewer.classList.contains('active')) return;
            if (e.key === 'Escape') closeImageViewer();
            if (e.key === 'ArrowLeft') showPrevImage();
            if (e.key === 'ArrowRight') showNextImage();
        });
    </script>
